name: Automated API tests using Postman CLI

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: read

concurrency:
  group: postman-tests
  cancel-in-progress: false

env:
  POSTMAN_COLLECTION_ID: "14800954-4344e3f9-b3a3-4dca-8f54-f94e77ac1cf8"

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Run API tests
        run: postman collection run "${{ env.POSTMAN_COLLECTION_ID }}"

      - name: Report failure
        if: failure()
        run: echo "❌ API tests failed. Check the logs above for details."
